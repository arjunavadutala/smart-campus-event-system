<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient min-h-screen">

    <nav class="navbar">
        <h2 class="brand-title" style="font-size: 1.5rem;">Smart Campus</h2>
        <div class="nav-links" style="align-items: center;">
            <a href="/student/events">Upcoming Events</a>
            <a href="/student/my-registrations">My Registrations</a>
            <a href="/student/profile" style="color:white; font-weight: 600;">Profile</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container fade-in" style="max-width: 600px; margin: 50px auto;">
        <h2 class="mb-4 text-center">User Profile</h2>

        <div class="form-container" style="padding: 2rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <!-- A placeholder avatar -->
                <div style="width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-color), #2d1b4e); display: inline-flex; align-items: center; justify-content: center; font-size: 2.5rem; color: white; font-weight: bold; border: 3px solid rgba(255,255,255,0.1); margin-bottom: 1rem;" th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">
                    U
                </div>
                <h3 th:text="${user.username}" style="color: white;">Username</h3>
                <span class="badge" th:text="${#strings.replace(user.role, 'ROLE_', '')}">Role</span>
            </div>

            <div class="event-info" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                <strong>User ID:</strong> <span th:text="${user.id}"></span>
            </div>
            <div class="event-info mt-3" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                <strong>Role Level:</strong> <span th:text="${user.role}"></span>
            </div>
            <div class="event-info mt-3" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">
                <strong>Total Registrations:</strong> <span th:text="${registrationCount}" class="badge" style="background: var(--primary-hover);">0</span>
            </div>
        </div>
    </div>

</body>
</html>
