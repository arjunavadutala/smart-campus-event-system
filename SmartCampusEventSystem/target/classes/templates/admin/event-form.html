<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Event Form</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient flex-center min-h-screen" style="align-items: flex-start; padding-top: 5vh;">

    <div class="glass-card fade-in" style="max-width: 600px;">
        <h2 class="brand-title text-center" th:text="${event.id == null ? 'Create New Event' : 'Edit Event'}">Form</h2>
        
        <form th:action="@{/admin/events/save}" th:object="${event}" method="post" class="mt-4">
            <input type="hidden" th:field="*{id}" />
            
            <div class="form-group row">
                <label>Title</label>
                <input type="text" th:field="*{title}" class="form-control" />
                <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-danger small"></span>
            </div>

            <div class="form-group row mt-3">
                <label>Description</label>
                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-danger small"></span>
            </div>

            <div class="form-group row mt-3">
                <label>Date</label>
                <input type="date" th:field="*{eventDate}" class="form-control" />
                <span th:if="${#fields.hasErrors('eventDate')}" th:errors="*{eventDate}" class="text-danger small"></span>
            </div>

            <div class="form-group row mt-3">
                <label>Department</label>
                <select th:field="*{department}" class="form-control" style="appearance: auto;">
                    <option value="Computer Science">Computer Science</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Electrical">Electrical</option>
                    <option value="General">General</option>
                </select>
            </div>

            <div class="form-group row mt-3">
                <label>Event Type</label>
                <select th:field="*{eventType}" class="form-control" style="appearance: auto;">
                    <option value="Workshop">Workshop</option>
                    <option value="Seminar">Seminar</option>
                    <option value="Cultural">Cultural</option>
                    <option value="Sports">Sports</option>
                </select>
            </div>

            <div class="form-group row mt-3">
                <label>Max Attendees</label>
                <input type="number" th:field="*{maxAttendees}" class="form-control" />
                <span th:if="${#fields.hasErrors('maxAttendees')}" th:errors="*{maxAttendees}" class="text-danger small"></span>
            </div>

            <div class="flex-center mt-4" style="gap: 15px;">
                <button type="submit" class="btn btn-primary w-100">Save</button>
                <a href="/admin/dashboard" class="btn btn-danger w-100 text-center">Cancel</a>
            </div>
        </form>
    </div>

</body>
</html>
