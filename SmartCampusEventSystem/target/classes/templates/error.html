<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Smart Campus - Error</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient flex-center min-h-screen">
    <div class="glass-card text-center fade-in">
        <h1 class="brand-title" style="background: linear-gradient(to right, #ef4444, #f87171); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Oops!</h1>
        <p class="subtitle mt-3">Something went wrong.</p>
        <div class="alert alert-danger mt-3" th:text="${errorMessage != null ? errorMessage : 'An unexpected error occurred.'}"></div>
        <button onclick="window.history.back()" class="btn btn-primary mt-4 w-100">Go Back</button>
    </div>
</body>
</html>
