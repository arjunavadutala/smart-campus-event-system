<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Smart Campus - Register</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient flex-center min-h-screen">

    <div class="glass-card fade-in">
        <div class="text-center">
            <h1 class="brand-title">Register</h1>
            <p class="subtitle">Join Smart Campus Events</p>
        </div>

        <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${user}" method="post" class="mt-4">
            <div class="form-group row">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" class="form-control" required autofocus />
                <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger small"></span>
            </div>
            
            <div class="form-group row mt-3">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" class="form-control" required />
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small"></span>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mt-4">Register</button>
        </form>

        <p class="text-center mt-3"><a href="/login" class="link">Already have an account? Login.</a></p>
    </div>

</body>
</html>
