<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Smart Campus - Login</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient flex-center min-h-screen">

    <div class="glass-card fade-in">
        <div class="text-center">
            <h1 class="brand-title">Smart Campus</h1>
            <p class="subtitle">Event Management System</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger mt-3">
            Invalid username and password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success mt-3">
            You have been logged out.
        </div>
        <div th:if="${param.registerSuccess}" class="alert alert-success mt-3">
            Registration successful! Please login.
        </div>

        <form th:action="@{/login}" method="post" class="mt-4">
            <div class="form-group row">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus />
            </div>
            <div class="form-group row mt-3">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required />
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mt-4">Login</button>
        </form>

        <p class="text-center mt-3"><a href="/register" class="link">Don't have an account? Register here.</a></p>
    </div>

</body>
</html>
