<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Registrations</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient min-h-screen">

    <nav class="navbar">
        <h2 class="brand-title" style="font-size: 1.5rem;">Smart Campus</h2>
        <div class="nav-links" style="align-items: center;">
            <a href="/student/events">Upcoming Events</a>
            <a href="/student/my-registrations" style="color:white; font-weight: 600;">My Registrations</a>
            <a href="/student/profile">Profile</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container fade-in">
        <h2 class="mb-4">My Dashboard</h2>

        <div th:if="${successMessage}" class="alert alert-success mt-3" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger mt-3" th:text="${errorMessage}"></div>

        <div th:if="${registrations.empty}" class="alert alert-danger">
            You haven't registered for any events yet.
        </div>

        <div class="grid">
            <div class="event-card" th:each="reg : ${registrations}">
                <div class="badge" th:text="${reg.event.eventType}">Type</div>
                <h3 class="event-title mt-3" th:text="${reg.event.title}">Event Title</h3>
                
                <div class="event-info">
                    <strong>Date:</strong> <span th:text="${reg.event.eventDate}"></span>
                </div>
                <div class="event-info">
                    <strong>Registered At:</strong> <span th:text="${#temporals.format(reg.registrationTime, 'dd-MM-yyyy HH:mm')}"></span>
                </div>

                <div class="mt-4" th:if="${reg.feedback == null}">
                    <form th:action="@{/student/feedback/{id}(id=${reg.id})}" method="post">
                        <textarea name="feedback" class="form-control w-100" placeholder="Provide feedback..." rows="2" required></textarea>
                        <button type="submit" class="btn btn-primary w-100 mt-2">Submit Feedback</button>
                    </form>
                </div>
                
                <div class="mt-4" th:if="${reg.feedback != null}">
                    <strong>Your Feedback:</strong>
                    <div class="form-control mt-2" style="background: rgba(255,255,255,0.05); font-style: italic;" th:text="${reg.feedback}"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
