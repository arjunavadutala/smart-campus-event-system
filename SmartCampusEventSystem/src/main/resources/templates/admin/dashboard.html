<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient min-h-screen">

    <nav class="navbar">
        <h2 class="brand-title" style="font-size: 1.5rem;">EventAdmin</h2>
        <div class="nav-links">
            <a href="/admin/events/new" class="btn btn-primary" style="padding: 8px 16px;">+ Create Event</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container fade-in">
        <div class="filters">
            <form th:action="@{/admin/dashboard}" method="get" class="flex-center" style="gap: 10px;">
                <select name="department">
                    <option value="">All Departments</option>
                    <option value="Computer Science" th:selected="${selectedDept == 'Computer Science'}">Computer Science</option>
                    <option value="Mechanical" th:selected="${selectedDept == 'Mechanical'}">Mechanical</option>
                    <option value="Electrical" th:selected="${selectedDept == 'Electrical'}">Electrical</option>
                </select>
                <select name="eventType">
                    <option value="">All Event Types</option>
                    <option value="Workshop" th:selected="${selectedType == 'Workshop'}">Workshop</option>
                    <option value="Seminar" th:selected="${selectedType == 'Seminar'}">Seminar</option>
                    <option value="Cultural" th:selected="${selectedType == 'Cultural'}">Cultural</option>
                </select>
                <button type="submit" class="btn btn-primary" style="padding: 8px 12px;">Filter</button>
                <a href="/admin/dashboard" class="btn btn-danger" style="padding: 8px 12px; margin-left:10px;">Clear</a>
            </form>
        </div>

        <div th:if="${events.empty}" class="alert alert-danger">
            No events found matching your criteria.
        </div>

        <div class="grid">
            <div class="event-card" th:each="event : ${events}">
                <div class="badge" th:text="${event.eventType}">Type</div>
                <h3 class="event-title mt-3" th:text="${event.title}">Event Title</h3>
                <p class="event-info mb-3" style="color:var(--text-main);" th:text="${event.description}">Desc</p>
                
                <div class="event-info">
                    <strong>Date:</strong> <span th:text="${event.eventDate}"></span>
                </div>
                <div class="event-info">
                    <strong>Dept:</strong> <span th:text="${event.department}"></span>
                </div>
                <div class="event-info">
                    <strong>Registrations:</strong> 
                    <span th:text="${eventStats[event.id]} + ' / ' + ${event.maxAttendees}"></span>
                </div>

                <div class="mt-4 flex-center" style="justify-content: flex-start; gap: 10px;">
                    <a th:href="@{/admin/events/edit/{id}(id=${event.id})}" class="btn btn-primary" style="padding: 8px 16px;">Edit</a>
                    <a th:href="@{/admin/events/delete/{id}(id=${event.id})}" class="btn btn-danger" style="padding: 8px 16px;" onclick="return confirm('Are you sure you want to delete this event?');">Delete</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
