# Database Configuration
# Defaults to in-memory H2 for easy local startup.
# Override with environment variables to use MySQL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:smart_campus_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Hibernate settings (Auto-create schema based on entities)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# Server Port configurations
server.port=${PORT:8080}

# Thymeleaf caching (disabled for dev so we see changes instantly)
spring.thymeleaf.cache=false

# Optional local DB console (useful when running with H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable Spring Security default generated password printing as we use our own users
# (though it will still generate one if we don't configure AuthenticationManager completely, but we will config it)
spring.main.banner-mode=off
